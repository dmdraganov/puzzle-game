<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Puzzle Game</title>

    <link rel="stylesheet" href="src/styles/main.css" />
    <link
      rel="shortcut icon"
      href="/src/assets/favicon.svg"
      type="image/x-icon"
    />
  </head>

  <body>
    <div id="top-controls">
      <button id="hint">Подсказка</button>
      <button id="openMenuButton">Меню</button>
      <button id="newGameButton">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" fill="white">
          <path d="M0 0h24v24H0z" fill="none"/>
          <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
      </button>
    </div>

    <div id="game-wrapper">
      <div id="board"></div>
    </div>

    <div id="stats">
      ⏱ <span id="timer">0</span> ⭐ <span id="score">0</span>
    </div>

    <div id="win">
      <div id="win-text"></div>
      <div id="win-controls">
        <div class="win-controls-group">
          <select id="difficulty">
            <option value="3">Легко</option>
            <option value="4">Средне</option>
            <option value="6">Сложно</option>
          </select>
          <select id="gameMode">
            <option value="free">Свободный режим</option>
            <option value="time">На время</option>
          </select>
        </div>
        <button id="newGame">Новая игра</button>
        <button id="resumeGame">Продолжить</button>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
