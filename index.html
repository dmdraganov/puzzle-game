<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Puzzle Game</title>

    <link rel="stylesheet" href="src/styles/main.css" />
  </head>

  <body>
    <div id="board"></div>

    <div id="stats">
      ⏱ <span id="timer">0</span> ⭐ <span id="score">0</span>
      <button id="hint">Подсказка</button>
    </div>

    <div id="win">
      <div id="win-text"></div>
      <div id="win-controls">
        <div class="win-controls-group">
          <select id="difficulty">
            <option value="3">Легко</option>
            <option value="4">Средне</option>
            <option value="6">Сложно</option>
          </select>
          <select id="gameMode">
            <option value="free">Свободный режим</option>
            <option value="time">На время</option>
          </select>
        </div>
        <button id="newGame">Новая игра</button>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
